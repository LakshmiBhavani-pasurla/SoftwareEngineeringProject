<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SecureDocument Portal</title>
    <style>
        :root {
            --primary-blue: #516d8a; 
            --primary-hover: #1c3e63;
            --bg-light: #eef1f5; /* Light grey-blue for the page background */
            --text-dark: #333333;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .logo {
            width: 80px;
            margin-bottom: 15px;
        }

        h2 {
            color: var(--text-dark);
            margin-bottom: 5px;
            font-size: 1.5em;
        }

        p.subtitle {
            color: #777;
            font-size: 0.9em;
            margin-bottom: 30px;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box; /* Ensures padding doesn't affect total width */
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-blue);
            outline: none;
        }

        .btn {
            background-color: var(--primary-blue);
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 20px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .switch-page {
            font-size: 0.9em;
            color: #555;
        }

        .switch-page a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: bold;
        }

        .switch-page a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <img src="/static/images/logo.png" alt="SecureDoc Logo" class="logo">
        
        <h2>SecureDoc Login</h2>
        <p class="subtitle">Secure Document Verification System</p>

        <form action="/login" method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>
            
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <div class="switch-page">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>

</body>
</html>
