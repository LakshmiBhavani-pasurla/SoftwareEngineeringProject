<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - SecureDocument Portal</title>
    <style>
        :root {
        /* The slate blue from your latest image */
        --primary-blue: #516d8a; 
        --primary-hover: #3e546a;
        --bg-light: #eef1f5;
        --text-dark: #333333;
    }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Changed to min-height so it scrolls on small screens if needed */
            margin: 0;
            padding: 20px 0; 
        }

        .auth-card {
            background-color: #ffffff;
            padding: 35px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px; /* Made slightly wider to accommodate more fields beautifully */
            text-align: center;
            box-sizing: border-box;
        }

        .logo {
            width: 70px; /* Slightly smaller logo to save space */
            margin-bottom: 10px;
        }

        h2 {
            color: var(--text-dark);
            margin-bottom: 25px;
            font-size: 1.8em;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        /* Added styling for labels based on your screenshot */
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #555555;
            font-size: 0.9em;
        }

        /* Applied the input styles to the select dropdown as well */
        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s;
            background-color: #fff;
            color: #333;
        }

        .input-group input:focus, 
        .input-group select:focus {
            border-color: var(--primary-blue);
            outline: none;
            box-shadow: 0 0 4px rgba(42, 90, 143, 0.2);
        }

        /* Specific fix to ensure placeholder text looks nice */
        ::placeholder {
            color: #999;
        }

        .btn {
            background-color: var(--primary-blue);
            color: white;
            padding: 14px;
            width: 100%;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .switch-page {
            font-size: 0.95em;
            color: #666;
        }

        .switch-page a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase; /* Matched the uppercase style from your image */
            font-size: 0.9em;
            margin-left: 5px;
        }

        .switch-page a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <img src="/static/images/logo.png" alt="SecureDoc Logo" class="logo">
        
        <h2>Create Account</h2>

        <form action="/register" method="POST">
            
            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter full name" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter email address" required>
            </div>

            <div class="input-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>

            <div class="input-group">
                <label for="role">System Role</label>
                <select id="role" name="role" required>
                    <option value="User">User</option>
                    <option value="Verifier">Verifier</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>

            <button type="submit" class="btn">SIGN UP</button>
        </form>

        <div class="switch-page">
            Already have an account? <a href="/login">LOGIN HERE</a>
        </div>
    </div>

</body>
</html>
